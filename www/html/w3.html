<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam | your name</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4A6C8C',
                        secondary: '#7B8EA5',
                        dark: '#2C3E50',
                        light: '#E8EDF2'
                    },
                    fontFamily: ['Noto Sans SC', 'sans-serif']
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-gradient-blue-gray {
                background: linear-gradient(135deg, #4A6C8C 0%, #7B8EA5 100%);
            }
        }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background: #F5F7FA; }
        .back-btn { transition: 0.3s; display: inline-flex; }
        .back-btn:hover { transform: translateX(-3px); }
        .copy-num {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .copy-num:hover {
            color: #4A6C8C;
            transform: scale(1.03);
        }
        .tip-copy {
            font-size: 0.85rem;
            color: #4A6C8C;
            height: 1.2rem;
        }
    </style>
</head>
<body class="min-h-screen px-4 py-8">

<!-- 顶部导航：当前页为刷新按钮 -->
<div class="max-w-lg mx-auto mb-6 flex flex-wrap justify-center gap-2 text-sm">
    <a href="w2.html" class="px-3 py-1 bg-light text-primary rounded">微信</a>
    <span onclick="location.reload()" class="px-3 py-1 bg-primary text-white rounded cursor-pointer">刷新</span>
    <a href="w4.html" class="px-3 py-1 bg-light text-primary rounded">Github</a>
    <a href="w5.html" class="px-3 py-1 bg-light text-primary rounded">邮箱</a>
    <a href="w6.html" class="px-3 py-1 bg-light text-primary rounded">作品</a>
</div>

    <div class="w-full max-w-lg bg-white rounded-2xl overflow-hidden mx-auto">
        <!-- 补上和其他页面一样的顶部渐变条 -->
        <div class="h-2 bg-gradient-blue-gray w-full"></div>
        <div class="py-14 px-8">
            <!-- 改成靠左，不再居中 -->
            <a href="w1.html" class="back-btn items-center gap-2 text-primary mb-10">
                <i class="fa fa-arrow-left"></i> 返回主页
            </a>

            <div class="text-center">
                <!-- 好友代码 点击复制 -->
                <div id="steamCode" class="copy-num text-[clamp(1.8rem,6vw,2.5rem)] font-bold text-dark mb-2">
                    steam id
                </div>
                <div class="tip-copy mb-6" id="copyTip"></div>

                <!-- 跳转个人资料 -->
                <a href="https://steamcommunity.com/profiles/steamid/"
                   target="_blank"
                   class="text-xl text-primary font-semibold block mb-10">
                    steam name
                </a>

                <i class="fa fa-steam text-[clamp(3rem,10vw,5rem)] text-primary"></i>
            </div>
        </div>
        <div class="py-4 bg-light text-center text-sm text-secondary">© 2026 your name</div>
    </div>

    <script>
        const steamCode = document.getElementById('steamCode');
        const copyTip = document.getElementById('copyTip');
        const codeText = 'steam id';

        steamCode.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(codeText);
                copyTip.innerText = '已复制好友代码！';
            } catch (err) {
                // 兼容低版本浏览器
                const input = document.createElement('input');
                input.value = codeText;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                copyTip.innerText = '已复制好友代码！';
            }
            setTimeout(() => copyTip.innerText = '', 2000);
        });
// 在线人数统计（所有页面都生效）
function updateOnline() {
    fetch('/online.php').catch(err => {});
}

// 页面加载时上报在线
updateOnline();

// 定时心跳（保持在线）
setInterval(updateOnline, 5000);

// 关闭页面时离开
window.addEventListener('beforeunload', () => {
    navigator.sendBeacon('/online.php?act=leave');
});
</script>
</body>
</html>
