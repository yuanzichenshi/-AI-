    <div class="w-full max-w-lg bg-white rounded-2xl card-shadow overflow-hidden mx-auto">
        <div class="h-2 bg-gradient-blue-gray w-full"></div>
        <div class="py-12 px-8 text-center">
            <a href="/w1.html" class="back-btn flex items-center gap-2 text-primary mb-8">
                <i class="fa fa-arrow-left"></i>
                <span>返回主页</span>
            </a>

            <h1 class="text-[clamp(1.5rem,5vw,2.2rem)] font-bold text-primary mb-10">
                每“日”一遍，煞笔微软
            </h1>

            <div class="flex items-center justify-center gap-4 mb-8">
                <input type="checkbox" id="checkIn" class="check-box accent-primary">
                <label for="checkIn" class="text-secondary text-lg font-medium">今日已打卡</label>
            </div>

            <div class="space-y-3 text-secondary text-base mb-4">
                <p>连续打卡：<span id="current" class="text-primary font-bold">0</span> 天</p>
                <p>历史最高：<span id="highest" class="text-primary font-bold">0</span> 天</p>
            </div>
        </div>
        <div class="py-4 bg-light text-center text-sm text-secondary">
            © 2026 your name | All Rights Reserved
        </div>
    </div>

    <script>
        const checkIn = document.getElementById('checkIn');
        const currentEl = document.getElementById('current');
        const highestEl = document.getElementById('highest');

        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function initData() {
            const data = JSON.parse(localStorage.getItem('msCheckIn') || '{"lastDate":"","current":0,"highest":0,"checked":false}');
            const today = getToday();

            if (data.lastDate !== today) {
                data.checked = false;
                data.lastDate = today;
                saveData(data);
            }

            checkIn.checked = data.checked;
            checkIn.disabled = data.checked;
            currentEl.textContent = data.current;
            highestEl.textContent = data.highest;
        }

        function saveData(data) {
            localStorage.setItem('msCheckIn', JSON.stringify(data));
        }

        checkIn.addEventListener('change', () => {
            const data = JSON.parse(localStorage.getItem('msCheckIn'));
            if (checkIn.checked) {
                data.checked = true;
                data.current += 1;
                if (data.current > data.highest) {
                    data.highest = data.current;
                }
                saveData(data);
                currentEl.textContent = data.current;
                highestEl.textContent = data.highest;
                checkIn.disabled = true;
            } else {
                checkIn.checked = true;
            }
        });

        initData();
    </script>
